<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>Video Player!</title>
</head>
<body>
    <div id="app">
        <!-- Видео плеер -->
        <video :src="videoURL" controls autoplay style="width: 100%; max-width: 800px; background: #000;"></video>
        <hr />
        <input v-model="searchTerm" placeholder="Пойск Фильмов" type="search">
        <button @click="findMovie">Найти</button>
        <ul>
            <li v-for="file in files" :key="file.magnet">
                {{ file.title }}
                <button @click="play(file)">Play</button>
            </li>
        </ul>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    searchTerm: '',
                    activeVideo: {},
                    files: []
                }
            },
            async mounted() {
                this.getMyMovies()
            },
            computed: {
                videoURL: ({activeVideo}) => activeVideo.fileName ? `/stream/${activeVideo.magnet}/${activeVideo.fileName}` : ''
            },
            
          methods: {
          async play(file) {
            const {data} = await axios.get(`stream/add/${file.magnet}`)
            console.log(data)
            this.activeVideo = {
                magnet: file.magnet,
                fileName: data[0]?.name
            }
          },
                async findMovie() {
                    const response = await axios.get(`/movies/search?searchTerm=${this.searchTerm}`)
                    this.files = response.data

                },
                async getMyMovies() {
                    const response = await axios.get('/movies')
                    this.files = response.data
                }


            }
        }).mount('#app');
    </script>
</body>
</html>
